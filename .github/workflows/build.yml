name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  JAVA_VERSION: '17'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p /opt/android-sdk/cmdline-tools
          cd /opt/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          echo "sdk.dir=/opt/android-sdk" > $GITHUB_WORKSPACE/android/local.properties

      - name: Install Android SDK components
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Verify files
        run: |
          ls -la $GITHUB_WORKSPACE/android/
          ls -la $GITHUB_WORKSPACE/android/gradlew

      - name: Build with Gradle
        working-directory: ./android
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export JAVA_HOME=${{ env.JAVA_HOME }}
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tail -100

      - name: Check build output
        run: |
          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "BUILD SUCCESS!"
            ls -la android/app/build/outputs/apk/debug/
          else
            echo "BUILD FAILED - checking logs..."
            find android -name "*.log" -type f 2>/dev/null | head -5
            cat android/app/build/outputs/logs/*.log 2>/dev/null || true
          fi

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readflow-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
